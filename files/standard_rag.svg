<rect x="256" y="830" width="280" height="140" rx="8" fill="#0a1628" stroke="#7c3aed" stroke-width="1.5"/>
<text x="396" y="851" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="700">⚙ Context Engine</text>
<line x1="266" y1="857" x2="526" y2="857" stroke="#1e293b" stroke-width="1"/>
<text x="278" y="873" fill="#f97316" font-size="9" font-weight="700">①</text><text x="292" y="873" fill="#e2e8f0" font-size="9">QueryRewriter</text><text x="396" y="873" fill="#64748b" font-size="9">pronouns</text>
<text x="278" y="889" fill="#f97316" font-size="9" font-weight="700">②</text><text x="292" y="889" fill="#e2e8f0" font-size="9">Two-Stage Retrieve</text><text x="406" y="889" fill="#64748b" font-size="9">page+chunk</text>
<text x="278" y="905" fill="#f97316" font-size="9" font-weight="700">③</text><text x="292" y="905" fill="#e2e8f0" font-size="9">MMR Re-rank</text><text x="386" y="905" fill="#64748b" font-size="9">λ=0.7 diversity</text>
<text x="278" y="921" fill="#f97316" font-size="9" font-weight="700">④</text><text x="292" y="921" fill="#e2e8f0" font-size="9">Compressor</text><text x="378" y="921" fill="#64748b" font-size="9">TF-IDF drop</text>
<text x="278" y="937" fill="#f97316" font-size="9" font-weight="700">⑤</text><text x="292" y="937" fill="#e2e8f0" font-size="9">TokenBudget</text><text x="384" y="937" fill="#64748b" font-size="9">3000 tokens</text>
<text x="278" y="953" fill="#f97316" font-size="9" font-weight="700">⑥</text><text x="292" y="953" fill="#e2e8f0" font-size="9">PromptBuilder</text><text x="388" y="953" fill="#64748b" font-size="9">structured</text>
<text x="278" y="966" fill="#f97316" font-size="9" font-weight="700">⑦</text><text x="292" y="966" fill="#e2e8f0" font-size="9">Memory</text><text x="360" y="966" fill="#64748b" font-size="9">6-turn window</text>

<!-- LLM -->
<rect x="556" y="830" width="304" height="140" rx="8" fill="#0a1628" stroke="#2563eb" stroke-width="1.5"/>
<text x="708" y="851" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="700">🤖 LLM  →  ✅ Answer</text>
<line x1="566" y1="857" x2="850" y2="857" stroke="#1e293b" stroke-width="1"/>
